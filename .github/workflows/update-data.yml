name: Update BNI Data

on:
  workflow_dispatch:  # Déclenchement manuel depuis GitHub Actions
  schedule:
    - cron: '0 6 * * 1'  # Automatique chaque lundi à 6h00 UTC

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run scraper
        run: node scrape_bni.js

      - name: Enrich with BNI spheres
        run: node enrich_spheres.js

      - name: Commit updated data
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add bni_members.json
          git diff --staged --quiet || git commit -m "chore: update BNI member data $(date '+%Y-%m-%d')"
          git push
